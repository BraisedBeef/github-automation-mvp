name: Issue Agent

on:
  issues:
    types:
      - labeled
      - reopened
      - edited

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  solve-issue:
    if: contains(github.event.issue.labels.*.name, 'agent')
    runs-on: ubuntu-latest
    env:
      AGENT_BASE_BRANCH: ${{ vars.AGENT_BASE_BRANCH || 'dev' }}
      AGENT_API_URL: ${{ secrets.AGENT_API_URL }}
      AGENT_API_TOKEN: ${{ secrets.AGENT_API_TOKEN }}
      AGENT_DEMO_MODE: ${{ vars.AGENT_DEMO_MODE || 'true' }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}
      OPENAI_ENDPOINT_PATH: ${{ vars.OPENAI_ENDPOINT_PATH }}
      AGENT_VALIDATION_COMMAND: ${{ vars.AGENT_VALIDATION_COMMAND }}
      ENABLE_AUTO_MERGE: ${{ vars.ENABLE_AUTO_MERGE || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.AGENT_BASE_BRANCH }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build issue context
        run: node scripts/collect-issue-context.mjs

      - name: Generate agent result
        id: agent
        run: node scripts/request-agent-fix.mjs

      - name: Publish workflow summary
        if: always()
        run: node scripts/render-workflow-summary.mjs

      - name: Comment when issue is skipped
        if: steps.agent.outputs.can_handle != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const response = JSON.parse(fs.readFileSync('.agent-output/response.json', 'utf8'));
            const issue_number = context.payload.issue.number;
            const body = [
              'Agent 没有为这个 Issue 自动创建拉取请求。',
              '',
              response.summary || 'Agent API 没有返回处理说明。',
              '',
              '建议：补充更明确的复现步骤，或缩小问题范围后再重试。'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Apply generated patch
        if: steps.agent.outputs.can_handle == 'true'
        run: git apply --index --whitespace=fix .agent-output/issue.patch

      - name: Run validation command
        if: steps.agent.outputs.can_handle == 'true' && env.AGENT_VALIDATION_COMMAND != ''
        run: ${{ env.AGENT_VALIDATION_COMMAND }}

      - name: Commit and push agent branch
        if: steps.agent.outputs.can_handle == 'true'
        env:
          BASE_BRANCH: ${{ env.AGENT_BASE_BRANCH }}
          BRANCH_NAME: ${{ steps.agent.outputs.branch_name }}
          COMMIT_MESSAGE: ${{ steps.agent.outputs.commit_message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BASE_BRANCH":"refs/remotes/origin/$BASE_BRANCH"
          git checkout -B "$BASE_BRANCH" "origin/$BASE_BRANCH"
          git checkout -B "$BRANCH_NAME"
          git add -A
          git commit -m "$COMMIT_MESSAGE"
          git push --force-with-lease --set-upstream origin "$BRANCH_NAME"

      - name: Create or reuse pull request
        if: steps.agent.outputs.can_handle == 'true'
        id: cpr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.agent.outputs.branch_name }}
          PR_TITLE: ${{ steps.agent.outputs.pr_title }}
          PR_BODY: ${{ steps.agent.outputs.pr_body }}
          REPOSITORY: ${{ github.repository }}
          BASE_BRANCH: ${{ env.AGENT_BASE_BRANCH }}
        run: |
          existing_url="$(gh pr list --repo "$REPOSITORY" --head "$BRANCH_NAME" --state open --json url --jq '.[0].url')"
          if [ -n "$existing_url" ]; then
            pr_url="$existing_url"
          else
            pr_url="$(gh pr create --repo "$REPOSITORY" --base "$BASE_BRANCH" --head "$BRANCH_NAME" --title "$PR_TITLE" --body "$PR_BODY")"
          fi
          pr_number="${pr_url##*/}"
          {
            echo "pull-request-url=$pr_url"
            echo "pull-request-number=$pr_number"
          } >> "$GITHUB_OUTPUT"

      - name: Comment with pull request link
        if: steps.agent.outputs.can_handle == 'true' && steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number;
            const prNumber = '${{ steps.cpr.outputs.pull-request-number }}';
            const prUrl = '${{ steps.cpr.outputs.pull-request-url }}';
            const response = JSON.parse(require('node:fs').readFileSync('.agent-output/response.json', 'utf8'));
            const body = [
              response.issue_comment || 'Agent 已经为这个 Issue 创建了拉取请求。',
              '',
              `拉取请求：#${prNumber} (${prUrl})`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Enable auto-merge
        if: steps.agent.outputs.can_handle == 'true' && steps.cpr.outputs.pull-request-number != '' && env.ENABLE_AUTO_MERGE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash --repo "${{ github.repository }}"
